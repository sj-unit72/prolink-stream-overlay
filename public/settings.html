<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prolink OBS — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e0e0e0; }
  
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 32px; }
  
  /* Connection Status */
  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-radius: 12px;
    background: #1a1a1a; margin-bottom: 32px;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #666; flex-shrink: 0;
  }
  .status-dot.connected { background: #1db954; box-shadow: 0 0 8px rgba(29,185,84,0.5); }
  .status-dot.error { background: #e53935; box-shadow: 0 0 8px rgba(229,57,53,0.5); }
  .status-text { flex: 1; font-size: 14px; }
  .status-decks { font-size: 13px; color: #888; }
  
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    background: #333; color: #fff; transition: background 0.2s;
  }
  .btn:hover { background: #444; }
  .btn-primary { background: #1db954; }
  .btn-primary:hover { background: #1ed760; }
  
  /* Sections */
  .section {
    background: #1a1a1a; border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
  }
  .section h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #999; margin-bottom: 6px; }
  
  .field input[type="text"],
  .field input[type="number"],
  .field input[type="url"],
  .field select,
  .field textarea {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid #333; background: #0a0a0a; color: #fff;
    font-size: 14px; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: #1db954;
  }
  .field textarea { min-height: 80px; resize: vertical; }
  
  .field input[type="color"] {
    width: 50px; height: 36px; border: 1px solid #333;
    border-radius: 8px; background: #0a0a0a; cursor: pointer;
  }
  
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row .field { flex: 1; min-width: 150px; }
  
  .color-row { display: flex; align-items: center; gap: 12px; }
  .color-row input[type="text"] { flex: 1; }
  
  .toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .toggle input { display: none; }
  .toggle .switch {
    width: 40px; height: 22px; border-radius: 11px;
    background: #333; position: relative; transition: background 0.2s;
  }
  .toggle input:checked + .switch { background: #1db954; }
  .toggle .switch::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; transition: transform 0.2s;
  }
  .toggle input:checked + .switch::after { transform: translateX(18px); }
  .toggle span { font-size: 14px; }

  /* Preview */
  #preview-frame {
    width: 100%; height: 220px; border: 1px solid #333;
    border-radius: 12px; overflow: hidden; background: #000;
  }
  #preview-frame iframe {
    width: 100%; height: 100%; border: none;
  }
  
  /* Links */
  .links { display: flex; gap: 12px; margin-top: 16px; font-size: 13px; }
  .links a { color: #1db954; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px; background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px); border-top: 1px solid #222;
    display: flex; justify-content: flex-end; gap: 12px;
    z-index: 10;
  }
  .save-status { flex: 1; font-size: 13px; color: #888; padding: 8px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>🎧 Prolink OBS Overlay</h1>
  <p class="subtitle">Configure your Now Playing overlay for OBS</p>
  
  <!-- Connection Status -->
  <div class="status-bar" id="connection">
    <div class="status-dot" id="status-dot"></div>
    <div>
      <div class="status-text" id="status-text">Checking connection...</div>
      <div class="status-decks" id="status-decks"></div>
    </div>
    <button class="btn" onclick="reconnect()">Reconnect</button>
  </div>

  <!-- Preview -->
  <div class="section">
    <h2>Preview</h2>
    <div id="preview-frame">
      <iframe src="/overlay" id="preview-iframe"></iframe>
    </div>
    <div class="links">
      <a href="/overlay" target="_blank">Open overlay in new tab ↗</a>
      <span style="color:#333">|</span>
      <span style="color:#888">OBS URL: <code style="color:#1db954">http://localhost:<span id="port-display"></span>/overlay</code></span>
    </div>
  </div>

  <!-- Display Settings -->
  <div class="section">
    <h2>Display</h2>
    <div class="row">
      <div class="field">
        <label>Active Deck</label>
        <select id="activeDeck">
          <option value="auto">Auto (On-Air)</option>
          <option value="1">Deck 1</option>
          <option value="2">Deck 2</option>
        </select>
      </div>
      <div class="field">
        <label>Theme</label>
        <select id="theme">
          <option value="default">Default (Glass)</option>
          <option value="minimal">Minimal (Text Only)</option>
          <option value="vinyl">Vinyl (Spinning Art)</option>
        </select>
      </div>
      <div class="field">
        <label>Position</label>
        <select id="position">
          <option value="bottom-left">Bottom Left</option>
          <option value="bottom-right">Bottom Right</option>
          <option value="top-left">Top Left</option>
          <option value="top-right">Top Right</option>
          <option value="center">Center</option>
        </select>
      </div>
    </div>
    
    <div class="row" style="margin-top:16px">
      <div class="field"><label class="toggle"><input type="checkbox" id="showArtwork" checked><div class="switch"></div><span>Show Artwork</span></label></div>
      <div class="field"><label class="toggle"><input type="checkbox" id="showBpm" checked><div class="switch"></div><span>Show BPM</span></label></div>
      <div class="field"><label class="toggle"><input type="checkbox" id="showKey" checked><div class="switch"></div><span>Show Key</span></label></div>
      <div class="field"><label class="toggle"><input type="checkbox" id="showGenre"><div class="switch"></div><span>Show Genre</span></label></div>
      <div class="field"><label class="toggle"><input type="checkbox" id="animateTransitions" checked><div class="switch"></div><span>Animate Transitions</span></label></div>
    </div>
  </div>

  <!-- Style Settings -->
  <div class="section">
    <h2>Style</h2>
    <div class="row">
      <div class="field">
        <label>Background Color</label>
        <div class="color-row">
          <input type="color" id="backgroundColorPicker" value="#000000">
          <input type="text" id="backgroundColor" value="rgba(0,0,0,0.75)" placeholder="rgba(0,0,0,0.75)">
        </div>
      </div>
      <div class="field">
        <label>Text Color</label>
        <div class="color-row">
          <input type="color" id="textColorPicker" value="#ffffff">
          <input type="text" id="textColor" value="#ffffff">
        </div>
      </div>
      <div class="field">
        <label>Accent Color</label>
        <div class="color-row">
          <input type="color" id="accentColorPicker" value="#1db954">
          <input type="text" id="accentColor" value="#1db954">
        </div>
      </div>
    </div>
    
    <div class="row" style="margin-top:16px">
      <div class="field">
        <label>Font Family</label>
        <input type="text" id="fontFamily" value="'Inter', 'Helvetica Neue', sans-serif">
      </div>
      <div class="field">
        <label>Font Size (px)</label>
        <input type="number" id="fontSize" value="16" min="10" max="48">
      </div>
    </div>
    
    <div class="row" style="margin-top:16px">
      <div class="field">
        <label>Artwork Size (px)</label>
        <input type="number" id="artworkSize" value="120" min="40" max="300">
      </div>
      <div class="field">
        <label>Border Radius (px)</label>
        <input type="number" id="borderRadius" value="12" min="0" max="60">
      </div>
      <div class="field">
        <label>Padding (px)</label>
        <input type="number" id="padding" value="16" min="0" max="60">
      </div>
    </div>
    
    <div class="row" style="margin-top:16px">
      <div class="field">
        <label>Overlay Width (px)</label>
        <input type="number" id="overlayWidth" value="500" min="200" max="1200">
      </div>
      <div class="field">
        <label>Overlay Height (px)</label>
        <input type="number" id="overlayHeight" value="160" min="80" max="600">
      </div>
    </div>
    
    <div class="field" style="margin-top:16px">
      <label>Background Image URL (optional)</label>
      <input type="url" id="backgroundImage" placeholder="https://example.com/bg.jpg">
    </div>
  </div>

  <!-- Custom CSS -->
  <div class="section">
    <h2>Custom CSS</h2>
    <div class="field">
      <label>Additional CSS applied to the overlay</label>
      <textarea id="customCSS" placeholder="#overlay { border: 2px solid gold; }"></textarea>
    </div>
  </div>
  
  <div style="height:80px"></div>
</div>

<!-- Save Bar -->
<div class="save-bar">
  <div class="save-status" id="save-status"></div>
  <button class="btn" onclick="resetDefaults()">Reset Defaults</button>
  <button class="btn btn-primary" onclick="saveSettings()">Save & Apply</button>
</div>

<script>
const PORT = location.port;
document.getElementById('port-display').textContent = PORT;

const FIELDS = {
  text: ['activeDeck','theme','position','backgroundColor','textColor','accentColor','fontFamily','backgroundImage','customCSS'],
  number: ['fontSize','artworkSize','borderRadius','padding','overlayWidth','overlayHeight'],
  bool: ['showArtwork','showBpm','showKey','showGenre','animateTransitions'],
  color: {
    backgroundColorPicker: 'backgroundColor',
    textColorPicker: 'textColor',
    accentColorPicker: 'accentColor'
  }
};

// Color picker sync
Object.entries(FIELDS.color).forEach(([pickerId, textId]) => {
  const picker = document.getElementById(pickerId);
  const text = document.getElementById(textId);
  picker.addEventListener('input', () => { text.value = picker.value; });
  text.addEventListener('input', () => {
    if (/^#[0-9a-f]{6}$/i.test(text.value)) picker.value = text.value;
  });
});

// Auto-save on change
document.querySelectorAll('input, select, textarea').forEach(el => {
  el.addEventListener('change', () => saveSettings());
});

function getSettings() {
  const s = {};
  FIELDS.text.forEach(f => s[f] = document.getElementById(f).value);
  FIELDS.number.forEach(f => s[f] = parseInt(document.getElementById(f).value) || 0);
  FIELDS.bool.forEach(f => s[f] = document.getElementById(f).checked);
  return s;
}

function setSettings(s) {
  FIELDS.text.forEach(f => { if (s[f] !== undefined) document.getElementById(f).value = s[f]; });
  FIELDS.number.forEach(f => { if (s[f] !== undefined) document.getElementById(f).value = s[f]; });
  FIELDS.bool.forEach(f => { if (s[f] !== undefined) document.getElementById(f).checked = s[f]; });
  // Sync color pickers
  Object.entries(FIELDS.color).forEach(([pickerId, textId]) => {
    const val = document.getElementById(textId).value;
    if (/^#[0-9a-f]{6}$/i.test(val)) document.getElementById(pickerId).value = val;
  });
}

async function saveSettings() {
  const s = getSettings();
  try {
    const res = await fetch('/api/settings', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(s)
    });
    if (res.ok) {
      document.getElementById('save-status').textContent = '✅ Saved';
      setTimeout(() => document.getElementById('save-status').textContent = '', 2000);
      // Refresh preview
      document.getElementById('preview-iframe').src = '/overlay?' + Date.now();
    }
  } catch(e) {
    document.getElementById('save-status').textContent = '❌ Save failed';
  }
}

async function loadSettings() {
  try {
    const res = await fetch('/api/settings');
    const s = await res.json();
    setSettings(s);
  } catch {}
}

function resetDefaults() {
  if (!confirm('Reset all settings to defaults?')) return;
  setSettings({
    activeDeck: 'auto', theme: 'default', position: 'bottom-left',
    showArtwork: true, showBpm: true, showKey: true, showGenre: false, animateTransitions: true,
    backgroundColor: 'rgba(0,0,0,0.75)', textColor: '#ffffff', accentColor: '#1db954',
    fontFamily: "'Inter', 'Helvetica Neue', sans-serif", fontSize: 16,
    artworkSize: 120, borderRadius: 12, padding: 16,
    overlayWidth: 500, overlayHeight: 160, backgroundImage: '', customCSS: ''
  });
  saveSettings();
}

async function reconnect() {
  await fetch('/api/reconnect', { method: 'POST' });
  checkStatus();
}

async function checkStatus() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const decks = document.getElementById('status-decks');
    
    if (data.connected) {
      dot.className = 'status-dot connected';
      text.textContent = 'Connected to Prolink network';
      const deckInfo = Object.values(data.decks || {})
        .filter(d => d.deckId <= 4)
        .map(d => `Deck ${d.deckId}: ${d.title || 'Empty'} (${d.playState})`)
        .join(' · ');
      decks.textContent = deckInfo || 'No tracks loaded';
    } else {
      dot.className = 'status-dot error';
      text.textContent = data.connectionError || 'Not connected';
      decks.textContent = '';
    }
  } catch {
    document.getElementById('status-dot').className = 'status-dot error';
    document.getElementById('status-text').textContent = 'Server not reachable';
  }
}

// Init
loadSettings();
checkStatus();
setInterval(checkStatus, 5000);
</script>
</body>
</html>
