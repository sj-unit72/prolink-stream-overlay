<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now Playing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: transparent;
    overflow: hidden;
    font-family: var(--font-family, 'Inter', 'Helvetica Neue', sans-serif);
    color: var(--text-color, #fff);
  }

  #overlay {
    position: fixed;
    display: flex;
    align-items: center;
    gap: var(--padding, 16px);
    padding: var(--padding, 16px);
    background: var(--bg-color, rgba(0,0,0,0.75));
    border-radius: var(--border-radius, 12px);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    max-width: var(--overlay-width, 500px);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    overflow: hidden;
  }

  #overlay.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #overlay.hiding {
    opacity: 0;
    transform: translateY(20px);
  }

  /* Background image support */
  #overlay.has-bg {
    background-size: cover;
    background-position: center;
  }

  #overlay.has-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--bg-color, rgba(0,0,0,0.75));
    border-radius: inherit;
  }

  #overlay > * {
    position: relative;
    z-index: 1;
  }

  /* Artwork */
  #artwork-container {
    flex-shrink: 0;
    width: var(--artwork-size, 120px);
    height: var(--artwork-size, 120px);
    border-radius: calc(var(--border-radius, 12px) - 4px);
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #artwork {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.4s ease;
  }

  #artwork-placeholder {
    font-size: calc(var(--artwork-size, 120px) * 0.35);
    opacity: 0.3;
  }

  /* Track Info */
  #track-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }

  #title {
    font-size: calc(var(--font-size, 16px) * 1.25);
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  #artist {
    font-size: var(--font-size, 16px);
    font-weight: 400;
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  #meta {
    display: flex;
    gap: 12px;
    margin-top: 4px;
    font-size: calc(var(--font-size, 16px) * 0.75);
    opacity: 0.5;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #meta .tag {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #meta .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent-color, #1db954);
    display: inline-block;
  }

  /* Playing indicator */
  #playing-indicator {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
    margin-right: 4px;
  }

  #playing-indicator .bar {
    width: 3px;
    background: var(--accent-color, #1db954);
    border-radius: 1px;
    animation: equalizer 0.8s ease-in-out infinite alternate;
  }

  #playing-indicator .bar:nth-child(1) { height: 60%; animation-delay: 0s; }
  #playing-indicator .bar:nth-child(2) { height: 100%; animation-delay: 0.2s; }
  #playing-indicator .bar:nth-child(3) { height: 40%; animation-delay: 0.4s; }
  #playing-indicator .bar:nth-child(4) { height: 80%; animation-delay: 0.1s; }

  @keyframes equalizer {
    from { height: 20%; }
    to { height: 100%; }
  }

  /* === THEMES === */

  /* Minimal theme */
  body.theme-minimal #overlay {
    background: transparent;
    backdrop-filter: none;
    padding: 8px 0;
    border-radius: 0;
  }
  body.theme-minimal #artwork-container { display: none; }
  body.theme-minimal #title { font-size: calc(var(--font-size, 16px) * 1.5); }
  body.theme-minimal #artist { font-size: calc(var(--font-size, 16px) * 1.1); }
  body.theme-minimal #meta { display: none; }

  /* Vinyl theme */
  body.theme-vinyl #artwork-container {
    border-radius: 50%;
    animation: spin 3s linear infinite;
  }
  body.theme-vinyl #artwork-container.paused {
    animation-play-state: paused;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Ticker/scroll for long text */
  .scrolling {
    animation: scroll-text 10s linear infinite;
  }
  @keyframes scroll-text {
    0%, 20% { transform: translateX(0); }
    80%, 100% { transform: translateX(calc(-100% + var(--overlay-width, 500px) - var(--artwork-size, 120px) - 60px)); }
  }
</style>
</head>
<body>
  <div id="overlay">
    <div id="artwork-container">
      <img id="artwork" style="display:none" />
      <div id="artwork-placeholder">🎵</div>
    </div>
    <div id="track-info">
      <div id="title">Waiting for track...</div>
      <div id="artist"></div>
      <div id="meta">
        <span id="meta-bpm" class="tag" style="display:none"><span class="dot"></span> <span></span></span>
        <span id="meta-key" class="tag" style="display:none"><span class="dot"></span> <span></span></span>
        <span id="meta-genre" class="tag" style="display:none"><span class="dot"></span> <span></span></span>
      </div>
    </div>
    <div id="playing-indicator" style="display:none">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

<script>
const overlay = document.getElementById('overlay');
const artworkImg = document.getElementById('artwork');
const artworkPlaceholder = document.getElementById('artwork-placeholder');
const artworkContainer = document.getElementById('artwork-container');
const titleEl = document.getElementById('title');
const artistEl = document.getElementById('artist');
const metaBpm = document.getElementById('meta-bpm');
const metaKey = document.getElementById('meta-key');
const metaGenre = document.getElementById('meta-genre');
const playingIndicator = document.getElementById('playing-indicator');

let currentTrack = null;
let ws = null;
let reconnectTimer = null;

function applySettings(s) {
  if (!s) return;
  const root = document.documentElement;
  root.style.setProperty('--bg-color', s.backgroundColor || 'rgba(0,0,0,0.75)');
  root.style.setProperty('--text-color', s.textColor || '#fff');
  root.style.setProperty('--accent-color', s.accentColor || '#1db954');
  root.style.setProperty('--font-family', s.fontFamily || "'Inter', sans-serif");
  root.style.setProperty('--font-size', (s.fontSize || 16) + 'px');
  root.style.setProperty('--artwork-size', (s.artworkSize || 120) + 'px');
  root.style.setProperty('--border-radius', (s.borderRadius || 12) + 'px');
  root.style.setProperty('--padding', (s.padding || 16) + 'px');
  root.style.setProperty('--overlay-width', (s.overlayWidth || 500) + 'px');
  
  document.body.style.color = s.textColor || '#fff';
  
  // Theme
  document.body.className = s.theme ? `theme-${s.theme}` : '';
  
  // Background image
  if (s.backgroundImage) {
    overlay.style.backgroundImage = `url(${s.backgroundImage})`;
    overlay.classList.add('has-bg');
  } else {
    overlay.style.backgroundImage = '';
    overlay.classList.remove('has-bg');
  }

  // Artwork visibility
  artworkContainer.style.display = s.showArtwork !== false ? '' : 'none';

  // Custom CSS
  let customStyle = document.getElementById('custom-css');
  if (s.customCSS) {
    if (!customStyle) {
      customStyle = document.createElement('style');
      customStyle.id = 'custom-css';
      document.head.appendChild(customStyle);
    }
    customStyle.textContent = s.customCSS;
  } else if (customStyle) {
    customStyle.remove();
  }

  // Position
  overlay.style.top = overlay.style.bottom = overlay.style.left = overlay.style.right = '';
  const pos = s.position || 'bottom-left';
  if (pos.includes('top')) overlay.style.top = '20px';
  if (pos.includes('bottom')) overlay.style.bottom = '20px';
  if (pos.includes('left')) overlay.style.left = '20px';
  if (pos.includes('right')) overlay.style.right = '20px';
  if (pos === 'center') {
    overlay.style.top = '50%';
    overlay.style.left = '50%';
    overlay.style.transform = 'translate(-50%, -50%)';
  }
}

function updateOverlay(data) {
  if (!data) return;
  
  applySettings(data.settings);
  
  const deck = data.deck;
  
  if (!deck || !deck.title || deck.playState === 'empty') {
    overlay.classList.remove('visible');
    overlay.classList.add('hiding');
    return;
  }
  
  // Track info
  const trackKey = `${deck.title}-${deck.artist}`;
  const changed = trackKey !== currentTrack;
  currentTrack = trackKey;

  if (changed && data.settings?.animateTransitions) {
    overlay.classList.remove('visible');
    overlay.classList.add('hiding');
    setTimeout(() => {
      setTrackInfo(deck, data.settings);
      overlay.classList.remove('hiding');
      overlay.classList.add('visible');
    }, 400);
  } else {
    setTrackInfo(deck, data.settings);
    overlay.classList.remove('hiding');
    overlay.classList.add('visible');
  }
}

function setTrackInfo(deck, settings) {
  titleEl.textContent = deck.title;
  artistEl.textContent = deck.artist;
  
  // Artwork
  if (deck.artwork && settings?.showArtwork !== false) {
    artworkImg.src = deck.artwork;
    artworkImg.style.display = '';
    artworkPlaceholder.style.display = 'none';
  } else {
    artworkImg.style.display = 'none';
    artworkPlaceholder.style.display = '';
  }
  
  // Vinyl spin
  if (deck.playState === 'playing') {
    artworkContainer.classList.remove('paused');
  } else {
    artworkContainer.classList.add('paused');
  }
  
  // Meta tags
  if (deck.bpm && settings?.showBpm !== false) {
    metaBpm.querySelector('span:last-child').textContent = `${deck.bpm} BPM`;
    metaBpm.style.display = '';
  } else {
    metaBpm.style.display = 'none';
  }
  
  if (deck.key && settings?.showKey !== false) {
    metaKey.querySelector('span:last-child').textContent = deck.key;
    metaKey.style.display = '';
  } else {
    metaKey.style.display = 'none';
  }
  
  if (deck.genre && settings?.showGenre) {
    metaGenre.querySelector('span:last-child').textContent = deck.genre;
    metaGenre.style.display = '';
  } else {
    metaGenre.style.display = 'none';
  }
  
  // Playing indicator
  playingIndicator.style.display = deck.playState === 'playing' ? '' : 'none';
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'now_playing') updateOverlay(data);
    } catch {}
  };
  
  ws.onclose = () => {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };
  
  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
